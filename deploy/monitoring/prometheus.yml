global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # LMS server — đặt METRICS_TOKEN trong .env của server rồi điền vào đây
  - job_name: tat-lms
    metrics_path: /metrics
    params:
      token: ['DIEN_METRICS_TOKEN_VAO_DAY']
    static_configs:
      - targets: ['host.docker.internal:4000']

  # Tài nguyên máy chủ (CPU/RAM/đĩa/băng thông)
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']
